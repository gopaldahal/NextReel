<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300" width="200" height="300">
  <defs>
    <!-- Main background gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A1D2E"/>
      <stop offset="50%" stop-color="#151828"/>
      <stop offset="100%" stop-color="#0D0F1A"/>
    </linearGradient>

    <!-- Accent glow gradient -->
    <radialGradient id="glow-grad" cx="50%" cy="45%" r="40%">
      <stop offset="0%" stop-color="#E8A020" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#E8A020" stop-opacity="0"/>
    </radialGradient>

    <!-- Top vignette gradient -->
    <linearGradient id="vignette-top" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0D0F1A" stop-opacity="0.6"/>
      <stop offset="40%" stop-color="#0D0F1A" stop-opacity="0"/>
    </linearGradient>

    <!-- Bottom vignette gradient -->
    <linearGradient id="vignette-bot" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="60%" stop-color="#0D0F1A" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0D0F1A" stop-opacity="0.7"/>
    </linearGradient>

    <!-- Icon gradient -->
    <linearGradient id="icon-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8A020"/>
      <stop offset="100%" stop-color="#F4C842"/>
    </linearGradient>

    <!-- Film strip gradient -->
    <linearGradient id="strip-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#252840"/>
      <stop offset="100%" stop-color="#1A1D2E"/>
    </linearGradient>

    <clipPath id="rounded-clip">
      <rect width="200" height="300" rx="0" ry="0"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="200" height="300" fill="url(#bg-grad)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" clip-path="url(#rounded-clip)">
    <!-- Vertical lines -->
    <line x1="25"  y1="0" x2="25"  y2="300" stroke="#9BA3BC" stroke-width="0.5"/>
    <line x1="50"  y1="0" x2="50"  y2="300" stroke="#9BA3BC" stroke-width="0.5"/>
    <line x1="75"  y1="0" x2="75"  y2="300" stroke="#9BA3BC" stroke-width="0.5"/>
    <line x1="100" y1="0" x2="100" y2="300" stroke="#9BA3BC" stroke-width="0.5"/>
    <line x1="125" y1="0" x2="125" y2="300" stroke="#9BA3BC" stroke-width="0.5"/>
    <line x1="150" y1="0" x2="150" y2="300" stroke="#9BA3BC" stroke-width="0.5"/>
    <line x1="175" y1="0" x2="175" y2="300" stroke="#9BA3BC" stroke-width="0.5"/>
    <!-- Horizontal lines -->
    <line x1="0" y1="37"  x2="200" y2="37"  stroke="#9BA3BC" stroke-width="0.5"/>
    <line x1="0" y1="75"  x2="200" y2="75"  stroke="#9BA3BC" stroke-width="0.5"/>
    <line x1="0" y1="112" x2="200" y2="112" stroke="#9BA3BC" stroke-width="0.5"/>
    <line x1="0" y1="150" x2="200" y2="150" stroke="#9BA3BC" stroke-width="0.5"/>
    <line x1="0" y1="187" x2="200" y2="187" stroke="#9BA3BC" stroke-width="0.5"/>
    <line x1="0" y1="225" x2="200" y2="225" stroke="#9BA3BC" stroke-width="0.5"/>
    <line x1="0" y1="262" x2="200" y2="262" stroke="#9BA3BC" stroke-width="0.5"/>
  </g>

  <!-- Film strip — top -->
  <rect x="0" y="0" width="200" height="22" fill="url(#strip-grad)"/>
  <!-- Sprocket holes top -->
  <rect x="6"   y="4" width="14" height="14" rx="2" fill="#0D0F1A"/>
  <rect x="28"  y="4" width="14" height="14" rx="2" fill="#0D0F1A"/>
  <rect x="50"  y="4" width="14" height="14" rx="2" fill="#0D0F1A"/>
  <rect x="72"  y="4" width="14" height="14" rx="2" fill="#0D0F1A"/>
  <rect x="94"  y="4" width="14" height="14" rx="2" fill="#0D0F1A"/>
  <rect x="116" y="4" width="14" height="14" rx="2" fill="#0D0F1A"/>
  <rect x="138" y="4" width="14" height="14" rx="2" fill="#0D0F1A"/>
  <rect x="160" y="4" width="14" height="14" rx="2" fill="#0D0F1A"/>
  <rect x="182" y="4" width="12" height="14" rx="2" fill="#0D0F1A"/>

  <!-- Film strip — bottom -->
  <rect x="0" y="278" width="200" height="22" fill="url(#strip-grad)"/>
  <!-- Sprocket holes bottom -->
  <rect x="6"   y="282" width="14" height="14" rx="2" fill="#0D0F1A"/>
  <rect x="28"  y="282" width="14" height="14" rx="2" fill="#0D0F1A"/>
  <rect x="50"  y="282" width="14" height="14" rx="2" fill="#0D0F1A"/>
  <rect x="72"  y="282" width="14" height="14" rx="2" fill="#0D0F1A"/>
  <rect x="94"  y="282" width="14" height="14" rx="2" fill="#0D0F1A"/>
  <rect x="116" y="282" width="14" height="14" rx="2" fill="#0D0F1A"/>
  <rect x="138" y="282" width="14" height="14" rx="2" fill="#0D0F1A"/>
  <rect x="160" y="282" width="14" height="14" rx="2" fill="#0D0F1A"/>
  <rect x="182" y="282" width="12" height="14" rx="2" fill="#0D0F1A"/>

  <!-- Ambient glow -->
  <rect width="200" height="300" fill="url(#glow-grad)"/>

  <!-- Vignettes -->
  <rect width="200" height="300" fill="url(#vignette-top)"/>
  <rect width="200" height="300" fill="url(#vignette-bot)"/>

  <!-- ─── Film reel icon ─── -->
  <!-- Outer ring -->
  <circle cx="100" cy="138" r="46" fill="none" stroke="url(#icon-grad)" stroke-width="2.5" stroke-opacity="0.7"/>
  <!-- Middle ring -->
  <circle cx="100" cy="138" r="34" fill="none" stroke="#E8A020" stroke-width="1" stroke-opacity="0.35"/>
  <!-- Inner hub -->
  <circle cx="100" cy="138" r="14" fill="#252840" stroke="url(#icon-grad)" stroke-width="2"/>
  <!-- Hub center dot -->
  <circle cx="100" cy="138" r="4" fill="url(#icon-grad)"/>

  <!-- Reel spokes (6×) -->
  <g transform="translate(100,138)" stroke="#E8A020" stroke-width="1.5" stroke-opacity="0.55" stroke-linecap="round">
    <line x1="0" y1="-14" x2="0"      y2="-34"/>
    <line x1="0" y1="-14" x2="17.4"   y2="-29.8" transform="rotate(60)"/>
    <line x1="0" y1="-14" x2="17.4"   y2="-29.8" transform="rotate(120)"/>
    <line x1="0" y1="-14" x2="0"      y2="-34"    transform="rotate(180)"/>
    <line x1="0" y1="-14" x2="17.4"   y2="-29.8" transform="rotate(240)"/>
    <line x1="0" y1="-14" x2="17.4"   y2="-29.8" transform="rotate(300)"/>
  </g>

  <!-- Sprocket circles on reel (3 × 120°) -->
  <circle cx="100" cy="104" r="6" fill="#1A1D2E" stroke="url(#icon-grad)" stroke-width="1.5"/>
  <circle cx="130" cy="159" r="6" fill="#1A1D2E" stroke="url(#icon-grad)" stroke-width="1.5"/>
  <circle cx="70"  cy="159" r="6" fill="#1A1D2E" stroke="url(#icon-grad)" stroke-width="1.5"/>

  <!-- Play triangle inside hub -->
  <polygon points="96,133 96,143 105,138" fill="url(#icon-grad)" opacity="0.9"/>

  <!-- Stars decoration -->
  <text x="38"  y="117" font-size="8" fill="#E8A020" opacity="0.4" font-family="serif">★</text>
  <text x="154" y="117" font-size="8" fill="#E8A020" opacity="0.4" font-family="serif">★</text>
  <text x="96"  y="82"  font-size="6" fill="#E8A020" opacity="0.25" font-family="serif">★</text>

  <!-- "NO POSTER" label -->
  <text
    x="100" y="205"
    text-anchor="middle"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="11"
    font-weight="700"
    letter-spacing="2.5"
    fill="#E8A020"
    opacity="0.75"
  >NO POSTER</text>

  <!-- Tagline -->
  <text
    x="100" y="222"
    text-anchor="middle"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="8"
    font-weight="500"
    letter-spacing="1"
    fill="#9BA3BC"
    opacity="0.5"
  >IMAGE NOT AVAILABLE</text>

  <!-- Thin separator line -->
  <line x1="60" y1="230" x2="140" y2="230" stroke="#E8A020" stroke-width="0.5" opacity="0.2"/>
</svg>
