{% extends "base.html" %}
{% block title %}Check Your Email — NextReel{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="card auth-card" style="text-align:center;">
    <div class="auth-card__brand">
      <a href="{% url 'home' %}" class="nav__brand"><span style="display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;background:linear-gradient(135deg,#e07b39,#f0a060);border-radius:7px;flex-shrink:0;"><svg viewBox="0 0 24 24" width="15" height="15" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="2" y="8" width="20" height="13" rx="2" fill="white"/><path d="M2 12h20" stroke="#e07b39" stroke-width="1.5"/><path d="M6 8L8 3M12 8L14 3M18 8L20 3" stroke="white" stroke-width="1.8" stroke-linecap="round"/></svg></span> NextReel</a>
    </div>
    <div class="card__body" style="padding:2rem 1.5rem;">
      <div style="font-size:3rem; margin-bottom:1rem;">&#9993;</div>
      <h1 class="auth-card__title">Check Your Email</h1>
      <p style="color:var(--text-muted); margin:1rem 0 1.5rem;">
        If an account with that email exists, we&rsquo;ve sent a password reset link.
        Check your inbox (and spam folder).
      </p>
      <a href="{% url 'users:login' %}" class="btn btn--primary">Back to Sign In</a>
    </div>
  </div>
</div>
{% endblock %}
