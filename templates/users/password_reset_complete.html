{% extends "base.html" %}
{% block title %}Password Reset Complete — NextReel{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="card auth-card" style="text-align:center;">
    <div class="auth-card__brand">
      <a href="{% url 'home' %}" class="nav__brand"><span>&#9654;</span> NextReel</a>
    </div>
    <div class="card__body" style="padding:2rem 1.5rem;">
      <div style="font-size:3rem; margin-bottom:1rem;">&#10003;</div>
      <h1 class="auth-card__title">Password Updated</h1>
      <p style="color:var(--text-muted); margin:1rem 0 1.5rem;">
        Your password has been set. You can now sign in with your new password.
      </p>
      <a href="{% url 'users:login' %}" class="btn btn--primary">Sign In</a>
    </div>
  </div>
</div>
{% endblock %}
