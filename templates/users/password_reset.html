{% extends "base.html" %}
{% block title %}Reset Password — NextReel{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="card auth-card">
    <div class="auth-card__brand">
      <a href="{% url 'home' %}" class="nav__brand"><span>&#9654;</span> NextReel</a>
    </div>
    <div class="card__header">
      <h1 class="auth-card__title">Reset Your Password</h1>
      <p class="auth-card__subtitle" style="color:var(--text-muted);">
        Enter your email address and we&rsquo;ll send you a reset link.
      </p>
    </div>
    <div class="card__body">
      <form method="post">
        {% csrf_token %}
        <div class="form-group">
          <label for="id_email" class="form-label">Email Address</label>
          <input type="email" id="id_email" name="email" class="form-input"
            placeholder="your@email.com" autocomplete="email" autofocus required />
        </div>
        <button type="submit" class="btn btn--primary" style="width:100%; justify-content:center;">
          Send Reset Link
        </button>
      </form>
    </div>
    <div class="card__footer" style="text-align:center; padding-top:1.25rem; border-top:1px solid var(--border);">
      <p style="color:var(--text-muted); font-size:0.9rem;">
        Remembered it? <a href="{% url 'users:login' %}" class="auth-link">Sign in</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
