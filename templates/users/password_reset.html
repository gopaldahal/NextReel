{% extends "base.html" %}
{% block title %}Reset Password — NextReel{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="card auth-card">
    <div class="auth-card__brand">
      <a href="{% url 'home' %}" class="nav__brand"><span style="display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;background:linear-gradient(135deg,#e07b39,#f0a060);border-radius:7px;flex-shrink:0;"><svg viewBox="0 0 24 24" width="15" height="15" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="2" y="8" width="20" height="13" rx="2" fill="white"/><path d="M2 12h20" stroke="#e07b39" stroke-width="1.5"/><path d="M6 8L8 3M12 8L14 3M18 8L20 3" stroke="white" stroke-width="1.8" stroke-linecap="round"/></svg></span> NextReel</a>
    </div>
    <div class="card__header">
      <h1 class="auth-card__title">Reset Your Password</h1>
      <p class="auth-card__subtitle" style="color:var(--text-muted);">
        Enter your email address and we&rsquo;ll send you a reset link.
      </p>
    </div>
    <div class="card__body">
      <form method="post">
        {% csrf_token %}
        <div class="form-group">
          <label for="id_email" class="form-label">Email Address</label>
          <input type="email" id="id_email" name="email" class="form-input"
            placeholder="your@email.com" autocomplete="email" autofocus required />
        </div>
        <button type="submit" class="btn btn--primary" style="width:100%; justify-content:center;">
          Send Reset Link
        </button>
      </form>
    </div>
    <div class="card__footer" style="text-align:center; padding-top:1.25rem; border-top:1px solid var(--border);">
      <p style="color:var(--text-muted); font-size:0.9rem;">
        Remembered it? <a href="{% url 'users:login' %}" class="auth-link">Sign in</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
